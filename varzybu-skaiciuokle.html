<!doctype html>
<html lang="lt">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Varžybų rezultatų skaičiuoklė</title>
<style>
:root{--green:#0d3b2e;--green2:#176b57;--gold:#c89b3c;--bg:#f3f6f4;--card:#fff;--line:#dce6e1;--muted:#64726c;--input:#fffbed}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:#17201d;font:15px/1.45 system-ui,-apple-system,"Segoe UI",sans-serif}header{background:linear-gradient(135deg,var(--green),#08271f);color:#fff;border-bottom:5px solid var(--gold)}.wrap{width:min(1500px,calc(100% - 28px));margin:auto}.hero{padding:34px 0 27px}.hero h1{margin:0 0 8px;font-size:clamp(28px,5vw,50px)}.hero p{margin:0;color:#dcebe5;max-width:920px}.bar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;padding:18px 0}.btn,.tabs button{border:1px solid #cbd9d3;background:#fff;color:var(--green);border-radius:999px;padding:10px 15px;font:inherit;font-weight:750;cursor:pointer;text-decoration:none}.btn.primary,.tabs button.active{background:var(--green);color:#fff;border-color:var(--green)}.btn.danger{color:#9d2d25}.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}.panel{background:var(--card);border:1px solid var(--line);border-radius:15px;padding:16px;margin-bottom:24px;box-shadow:0 8px 22px rgba(20,45,35,.04)}.notice{background:#e9f3ee;border-left:4px solid var(--green2);padding:11px 13px;margin-bottom:14px;border-radius:8px;color:#3e514a}.table-wrap{overflow:auto;border:1px solid var(--line);border-radius:10px;max-height:70vh}table{width:100%;border-collapse:collapse;min-width:930px}th,td{padding:7px 8px;border-bottom:1px solid #dfe7e3}th{position:sticky;top:0;background:var(--green2);color:#fff;z-index:2;text-align:left}td.num,th.num{text-align:right}.zone-start td{border-top:3px solid var(--green2)}tr[data-zone="A"] td.input{background:#fff8e8}tr[data-zone="B"] td.input{background:#eef7ff}tr[data-zone="C"] td.input{background:#f2f8ec}tr[data-zone="D"] td.input{background:#f8effa}tr[data-zone="E"] td.input{background:#fff0ef}input,select{width:100%;border:1px solid transparent;background:transparent;border-radius:6px;padding:7px 8px;font:inherit}input:focus,select:focus{outline:2px solid #55a68f;background:#fff}.calc{background:#edf6f2;font-weight:700}.zone{font-weight:800;text-align:center}.rank{font-weight:900;color:var(--green)}.empty{text-align:center;padding:35px;color:var(--muted)}.zone-tabs{display:flex;gap:7px;align-items:center;flex-wrap:wrap;margin:0 0 12px}.zone-tabs strong{margin-right:4px}.zone-tabs button{width:42px;height:42px;border:1px solid #bfcfc8;border-radius:50%;background:#fff;color:var(--green);font-weight:850;font-size:16px}.zone-tabs button.active{background:var(--green);color:#fff}footer{padding:20px 0 35px;color:var(--muted)}@media(max-width:700px){body{font-size:16px}.wrap{width:min(100% - 12px,1500px)}.panel{padding:7px}.hero{padding:22px 0}.hero h1{font-size:31px}.bar{align-items:stretch}.btn{flex:1;text-align:center;padding:12px 10px}.tabs{display:grid;grid-template-columns:1fr 1fr}.tabs button{padding:12px 8px}.notice{font-size:14px}.table-wrap{overflow:visible;border:0;max-height:none}table{min-width:0}table.day-table thead{display:none}table.day-table,table.day-table tbody,table.day-table tr,table.day-table td{display:block;width:100%}table.day-table tr{margin:0 0 12px;border:1px solid #cddbd5;border-radius:12px;overflow:hidden;background:#fff}table.day-table td{display:grid;grid-template-columns:115px minmax(0,1fr);align-items:center;min-height:47px;padding:6px 10px;text-align:left!important}table.day-table td:before{font-size:13px;font-weight:750;color:#53635d}table.day-table td:nth-child(1):before{content:"Vardas Pavardė"}table.day-table td:nth-child(2):before{content:"Komanda"}table.day-table td:nth-child(3):before{content:"Zona"}table.day-table td:nth-child(4):before{content:"Sektorius"}table.day-table td:nth-child(5):before{content:"Svoris (g)"}table.day-table td:nth-child(6):before{content:"Vieta zonoje"}table.day-table td:nth-child(7):before{content:"Baudos taškai"}table.day-table input,table.day-table select{min-height:42px;border:1px solid #c9d6d1;background:#fff;font-size:16px}.roster-table{min-width:0}.roster-table thead{display:none}.roster-table,.roster-table tbody,.roster-table tr,.roster-table td{display:block;width:100%}.roster-table tr{margin:0 0 10px;border:1px solid #cddbd5;border-radius:12px;overflow:hidden}.roster-table td{display:grid;grid-template-columns:115px minmax(0,1fr);align-items:center;padding:7px 10px;text-align:left!important}.roster-table td:nth-child(1):before{content:"Dalyvis Nr.";font-weight:750;color:#53635d}.roster-table td:nth-child(2):before{content:"Vardas Pavardė";font-weight:750;color:#53635d}.roster-table td:nth-child(3):before{content:"Komanda";font-weight:750;color:#53635d}.roster-table input{min-height:42px;border:1px solid #c9d6d1;background:#fff;font-size:16px}.final-table{min-width:880px}}
</style>
</head>
<body>
<header><div class="wrap hero"><h1>Varžybų rezultatų skaičiuoklė</h1><p>Trys dienos, penkios zonos ir automatinė galutinė įskaita. Mažiausia baudos taškų suma laimi; lygybės atveju aukščiau rikiuojamas didesnis bendras svoris.</p></div></header>
<main class="wrap">
  <div class="bar"><a class="btn" href="index.html">← Grįžti į reitingą</a><a class="btn primary" href="varzybu_rezultatu_sablonas.xlsx" download>Atsisiųsti Excel</a><button class="btn danger" id="clear">Išvalyti duomenis</button></div>
  <nav class="tabs"><button data-view="roster" class="active">Dalyvių sąrašas</button><button data-view="day0">Pirma diena</button><button data-view="day1">Antra diena</button><button data-view="day2">Trečia diena</button><button data-view="final">Galutinė įskaita</button></nav>
  <section class="panel"><div class="notice" id="notice"></div><div class="table-wrap" id="content"></div></section>
</main><footer><div class="wrap">Duomenys automatiškai saugomi šios naršyklės atmintyje.</div></footer>
<script>
const zones=['A','B','C','D','E'],key='feeder-varzybos-v2',slots=85;
const fresh=()=>({roster:Array.from({length:slots},()=>({name:'',team:''})),days:Array.from({length:3},()=>Array.from({length:slots},()=>({name:'',team:'',zone:'',sector:'',weight:''})))});
let state;try{state=JSON.parse(localStorage.getItem(key))||fresh()}catch{state=fresh()}let view='roster',zoneView='ALL';
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const save=()=>localStorage.setItem(key,JSON.stringify(state));
const effective=(day,row,field)=>state.days[day][row][field]||state.roster[row][field]||'';
function positions(day){const result=new Map(),rows=state.days[day];for(const z of zones){const valid=rows.map((r,i)=>({i,zone:r.zone,name:effective(day,i,'name'),w:Number(r.weight),weight:r.weight})).filter(r=>r.zone===z&&r.name.trim()&&r.weight!==''&&Number.isFinite(r.w));for(const r of valid)result.set(r.i,1+valid.filter(x=>x.w>r.w).length)}return result}
function rosterTable(){return '<table class="roster-table"><thead><tr><th class="num">Nr.</th><th>Vardas Pavardė</th><th>Komanda</th></tr></thead><tbody>'+state.roster.map((r,i)=>'<tr><td class="num">'+(i+1)+'</td><td class="input"><input data-roster-row="'+i+'" data-field="name" value="'+esc(r.name)+'" placeholder="Vardas Pavardė"></td><td class="input"><input data-roster-row="'+i+'" data-field="team" value="'+esc(r.team)+'" placeholder="Komanda"></td></tr>').join('')+'</tbody></table>'}
function dayTable(day){const pos=positions(day),buttons='<div class="zone-tabs"><strong>Rodyti:</strong><button type="button" data-zone-filter="ALL" class="'+(zoneView==='ALL'?'active':'')+'">Visi</button>'+zones.map(z=>'<button type="button" data-zone-filter="'+z+'" class="'+(z===zoneView?'active':'')+'">'+z+'</button>').join('')+'</div>',rows=state.days[day].map((r,i)=>({r,i,name:effective(day,i,'name'),team:effective(day,i,'team')})).filter(x=>x.name||x.r.name).filter(x=>zoneView==='ALL'||x.r.zone===zoneView);if(!rows.length)return buttons+'<div class="empty">Pirmiausia užpildykite „Dalyvių sąrašą“.</div>';return buttons+'<table class="day-table"><thead><tr><th>Vardas Pavardė</th><th>Komanda</th><th>Zona</th><th class="num">Sektorius</th><th class="num">Svoris (g)</th><th class="num">Vieta zonoje</th><th class="num">Baudos taškai</th></tr></thead><tbody>'+rows.map(x=>'<tr data-zone="'+esc(x.r.zone||'')+'"><td class="input"><input data-day="'+day+'" data-row="'+x.i+'" data-field="name" value="'+esc(x.name)+'" placeholder="Vardas Pavardė"></td><td class="input"><input data-day="'+day+'" data-row="'+x.i+'" data-field="team" value="'+esc(x.team)+'" placeholder="Komanda"></td><td class="input"><select data-day="'+day+'" data-row="'+x.i+'" data-field="zone"><option value="">–</option>'+zones.map(z=>'<option value="'+z+'" '+(x.r.zone===z?'selected':'')+'>'+z+'</option>').join('')+'</select></td><td class="input num"><input inputmode="numeric" type="number" min="1" max="17" data-day="'+day+'" data-row="'+x.i+'" data-field="sector" value="'+esc(x.r.sector)+'" placeholder="1–17"></td><td class="input num"><input inputmode="numeric" type="number" min="0" data-day="'+day+'" data-row="'+x.i+'" data-field="weight" value="'+esc(x.r.weight)+'" placeholder="0"></td><td class="calc num">'+(pos.get(x.i)??'')+'</td><td class="calc num">'+(pos.get(x.i)??'')+'</td></tr>').join('')+'</tbody></table>'}
function finalRows(){const map=new Map();state.days.forEach((rows,d)=>{const pos=positions(d);rows.forEach((r,i)=>{const name=effective(d,i,'name').trim();if(!name||!pos.has(i))return;const k=name.toLocaleLowerCase('lt-LT'),x=map.get(k)||{name,team:effective(d,i,'team'),points:['','',''],weights:[0,0,0]};if(!x.team)x.team=effective(d,i,'team');x.points[d]=pos.get(i);x.weights[d]=Number(r.weight)||0;map.set(k,x)})});const out=[...map.values()].map(x=>({...x,days:x.points.filter(v=>v!=='').length,total:x.points.reduce((s,v)=>s+(Number(v)||0),0),weight:x.weights.reduce((s,v)=>s+v,0)})).sort((a,b)=>a.total-b.total||b.weight-a.weight||a.name.localeCompare(b.name,'lt'));return out.map(x=>({...x,rank:1+out.filter(y=>y.total<x.total||(y.total===x.total&&y.weight>x.weight)).length}))}
function finalTable(){const rows=finalRows();if(!rows.length)return '<div class="empty">Įveskite bent vienos dienos zonas, sektorius ir svorius.</div>';return '<table class="final-table"><thead><tr><th class="num">Vieta</th><th>Vardas Pavardė</th><th>Komanda</th><th class="num">1 d. baudos</th><th class="num">2 d. baudos</th><th class="num">3 d. baudos</th><th class="num">Dienų</th><th class="num">Baudų suma</th><th class="num">Bendras svoris (g)</th></tr></thead><tbody>'+rows.map(r=>'<tr><td class="num rank">'+r.rank+'</td><td>'+esc(r.name)+'</td><td>'+esc(r.team)+'</td>'+r.points.map(p=>'<td class="num">'+p+'</td>').join('')+'<td class="num">'+r.days+'</td><td class="num"><strong>'+r.total+'</strong></td><td class="num">'+r.weight.toLocaleString('lt-LT')+'</td></tr>').join('')+'</tbody></table>'}
function notice(){if(view==='roster')return 'Vieną kartą suveskite visų dalyvių vardus ir komandas. Šis sąrašas bus naudojamas visomis dienomis.';if(view==='final')return '';return 'Po burtų įveskite zoną ir sektorių, po varžybų – svorį. Vardą ar komandą šioje dienoje galite pakeisti; pagrindinis dalyvių sąrašas nepasikeis.'}
function render(){document.querySelectorAll('.tabs button').forEach(b=>b.classList.toggle('active',b.dataset.view===view));const n=document.getElementById('notice');n.textContent=notice();n.style.display=view==='final'?'none':'block';document.getElementById('content').innerHTML=view==='roster'?rosterTable():view==='final'?finalTable():dayTable(Number(view.slice(3)))}
document.querySelector('.tabs').onclick=e=>{if(e.target.dataset.view){view=e.target.dataset.view;zoneView='ALL';render()}};
document.getElementById('content').onclick=e=>{if(e.target.dataset.zoneFilter){zoneView=e.target.dataset.zoneFilter;render()}};
document.getElementById('content').oninput=e=>{const x=e.target.dataset;if(x.rosterRow!==undefined){state.roster[Number(x.rosterRow)][x.field]=e.target.value}else if(x.day!==undefined){state.days[Number(x.day)][Number(x.row)][x.field]=e.target.value}else return;save()};
document.getElementById('content').onchange=e=>{const x=e.target.dataset;if(x.day!==undefined){state.days[Number(x.day)][Number(x.row)][x.field]=e.target.value;save();render()}};
document.getElementById('clear').onclick=()=>{if(confirm('Ar tikrai išvalyti dalyvių sąrašą ir visų trijų dienų duomenis?')){state=fresh();save();view='roster';render()}};render();
</script>
</body></html>
